version: "3.9"

services:
  # ── PostgreSQL Database ───────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: socialfeed_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: socialdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # These two files are executed automatically on first boot
      - ./db/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d socialdb" ]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── RabbitMQ Message Broker ───────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management
    container_name: socialfeed_rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672" # AMQP
      - "15672:15672" # Management UI
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Backend (FastAPI + WebSocket Bridge) ──────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: socialfeed_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      RABBITMQ_HOST: rabbitmq
      DATABASE_URL: postgresql://postgres:postgres@db:5432/socialdb
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ── Frontend (Next.js) ───────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: socialfeed_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_WS_URL: ws://localhost:8000/ws
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
